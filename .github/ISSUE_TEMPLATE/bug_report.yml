name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **If this is a security vulnerability, please do not file a public
        issue.** Email `team@oroagents.com` instead — see `SECURITY.md`.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug. What did you expect, and what did you observe?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Smallest possible snippet that triggers the bug. Ideally something we can paste into a fresh `uv` venv.
      render: python
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "`bittensor-auth` version"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: bittensor
    attributes:
      label: "`bittensor` version"
      placeholder: "8.0.0"

  - type: dropdown
    id: backend
    attributes:
      label: Cache backend
      options:
        - InMemoryCache
        - RedisCache
        - Custom
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / traceback
      render: text
