name: Feature request
description: Suggest an addition or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the use case or gap you've hit. Concrete problems land much faster than abstract "it would be nice if…" proposals.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: |
        Your preferred solution. Anything goes — an API sketch, a doc change, a new example, a config default, a helper, better defaults. Code sketches in fenced ```python blocks are welcome but not required.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What are the trade-offs? Is there an existing feature that almost works?

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: Backwards compatible (no breaking change)
        - label: Requires a wire-format change
        - label: Requires a new optional dependency
