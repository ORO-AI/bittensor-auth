name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dev dependencies
        run: uv sync --extra dev --extra fastapi --extra redis --extra client

      - name: Run pytest with coverage
        run: uv run pytest --cov=bittensor_auth --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra fastapi --extra redis --extra client
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra fastapi --extra redis --extra client
      - name: mypy
        run: uv run mypy src/

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra fastapi --extra redis --extra client
      - name: pip-audit
        # Do not fail CI on an advisory; surface it as a warning so dep
        # bumps can be scheduled without blocking feature work. Most
        # advisories are inherited from upstream `bittensor` and can't
        # be fixed here until a bittensor release bumps the dep.
        # `--skip-editable` lets the self-install (bittensor-auth in
        # the venv) skip the PyPI lookup that would otherwise 404.
        run: uv run pip-audit --skip-editable
        continue-on-error: true
