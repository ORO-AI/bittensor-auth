version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # `bittensor` is intentionally capped at <9.0.0 — major bumps need a
    # manual review of Keypair.verify / SS58 semantics before the cap is
    # lifted. Dependabot will still open a PR so we don't forget, but
    # don't auto-merge it.
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff*"
          - "mypy*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
